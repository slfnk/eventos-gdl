<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cartelera GDL</title>
<meta name="description" content="Cartelera independiente de Guadalajara — foros, galerías, conciertos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0c;
    --fg: #f4f4ea;
    --dim: #8a8a80;
    --hair: #2b2b26;
    --acid: #c6ff2e;   /* <- main accent, tweak here */
    --rosa: #ff4fd8;   /* <- second accent */
    --amarillo: #c6ff2e;
    --measure: 34rem;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Space Mono", monospace;
    font-size: 14px;
    line-height: 1.5;
    padding: 0 1.25rem;
  }
  ::selection { background: var(--acid); color: #000; }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--acid); outline-offset: 2px; }

  /* ---------- header ---------- */
  header { max-width: 56rem; margin: 0 auto; padding: 2.8rem 0 2.2rem; }
  header h1 {
    font-family: "Unbounded", sans-serif;
    font-weight: 900;
    font-size: clamp(1.9rem, 6.5vw, 3.4rem);
    line-height: 0.95;
    text-transform: lowercase;
    color: var(--acid);
    text-shadow: 4px 4px 0 var(--rosa);
    transform: rotate(-1deg);
    display: inline-block;
  }
  header .sub {
    font-size: 0.85rem;   /* <- tweak subtitle size here */
    text-transform: lowercase;
    letter-spacing: 0.05em;
    margin-top: 1rem;
    color: var(--fg);
  }
  header .updated {
    display: inline-block;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: var(--bg);
    background: var(--fg);
    padding: 0.2em 0.7em;
    border-radius: 999px;
    margin-top: 0.8rem;
    transform: rotate(0.6deg);
  }

  /* handles ticker */
  header .cuentas {
    margin-top: 1.1rem;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    padding: 0.55rem 0;
    font-size: 0.72rem;
  }
  header .cuentas .tira {
    display: inline-block;
    padding-right: 2rem;
    animation: tira 45s linear infinite;
  }
  header .cuentas:hover .tira { animation-play-state: paused; }
  header .cuentas a {
    text-decoration: none;
    border: 1px solid var(--hair);
    border-radius: 999px;
    padding: 0.1em 0.6em;
    margin-right: 0.45em;
    color: var(--dim);
  }
  header .cuentas a:hover, header .cuentas a:focus-visible {
    color: #000; background: var(--acid); border-color: var(--acid);
  }
  @keyframes tira { to { transform: translateX(-50%); } }

  header .about {
    max-width: var(--measure);
    font-size: 0.68rem;   /* <- tweak explainer size here */
    color: var(--dim);    /* <- tweak explainer grey here */
    margin-top: 1.2rem;
    line-height: 1.7;
  }

  /* ---------- date groups ---------- */
  main { max-width: 56rem; margin: 0 auto; padding-bottom: 4rem; }
  .day {
    display: grid;
    grid-template-columns: 9.5rem 1fr;
    gap: 0 2.5rem;
    padding: 2.4rem 0;
    border-top: 3px solid var(--fg);
  }
  .day:first-child { border-top: none; }

  .datemark { line-height: 0.9; }
  .datemark .dow {
    font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--dim); display: block; margin-bottom: 0.45rem;
  }
  .datemark .num {
    font-family: "Unbounded", sans-serif;
    font-weight: 900;
    font-size: clamp(2.3rem, 6vw, 3.4rem);
    color: var(--fg);
    display: inline-block;
    transform: rotate(-3deg);
  }
  .datemark .mon {
    font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--dim); display: block; margin-top: 0.55rem;
  }
  .datemark .hoy {
    display: inline-block;
    font-size: 0.66rem; letter-spacing: 0.14em; font-weight: 700;
    color: #000; background: var(--acid);
    padding: 0.2em 0.6em;
    margin-top: 0.6rem;
    transform: rotate(3deg);
  }
  .day.today .num { color: var(--acid); }
  .day.undated .datemark .sf {
    font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim); line-height: 1.8; display: block;
  }

  /* ---------- events ---------- */
  .events { display: flex; flex-direction: column; gap: 1.6rem; padding-top: 0.35rem; min-width: 0; }
  .event {
    max-width: var(--measure);
    border: 2px solid var(--fg);
    padding: 1rem 1.1rem 1.05rem;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .event:hover {
    transform: translate(-3px, -3px);
    box-shadow: 6px 6px 0 var(--acid);
  }
  .event h2 {
    font-family: "Unbounded", sans-serif;
    font-weight: 600;
    font-size: 0.98rem;
    line-height: 1.35;
    text-transform: lowercase;
  }
  .event.featured h2 span {
    background: var(--acid); color: #000;
    padding: 0.06em 0.3em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .event .revisar {
    font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--rosa); border: 1px solid var(--rosa);
    padding: 0.12em 0.45em; margin-left: 0.55em;
    vertical-align: middle; display: inline-block; transform: rotate(-1.5deg);
  }
  .event .artists { color: var(--dim); font-size: 0.82rem; margin-top: 0.35rem; }
  .event .meta {
    font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase;
    margin-top: 0.6rem; color: var(--fg); font-weight: 700;
  }
  .event .meta .sep { color: var(--hair); padding: 0 0.35em; }
  .event .links { font-size: 0.68rem; margin-top: 0.75rem; }
  .event .links .sep { display: none; }
  .event .links a {
    display: inline-block;
    text-decoration: none;
    border: 1.5px solid var(--fg);
    border-radius: 999px;
    padding: 0.22em 0.75em;
    margin: 0 0.4em 0.4em 0;
    color: var(--fg);
  }
  .event .links a:hover, .event .links a:focus-visible {
    background: var(--acid); color: #000; border-color: var(--acid);
  }
  .event .fuente { font-size: 0.66rem; margin-top: 0.25rem; color: var(--dim); }
  .event .fuente a { color: inherit; text-decoration: none; }
  .event .fuente a:hover, .event .fuente a:focus-visible { color: var(--acid); }
  .event .notes { font-size: 0.76rem; color: var(--dim); margin-top: 0.4rem; font-style: italic; }

  /* ---------- footer / admin ---------- */
  footer {
    max-width: 56rem; margin: 0 auto;
    padding: 2rem 0 3rem;
    border-top: 3px solid var(--fg);
    font-size: 0.7rem; color: var(--dim);
    display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  footer button {
    font: inherit; color: inherit;
    background: none; border: none;
    border-bottom: 1px solid var(--hair);
    cursor: pointer; padding: 0;
  }
  footer button:hover, footer button:focus-visible { color: var(--acid); border-color: var(--acid); }

  .status {
    max-width: 56rem; margin: 0 auto; padding: 3rem 0;
    font-size: 0.8rem; color: var(--dim);
  }

  /* ---------- edit mode ---------- */
  .admintools { display: none; font-size: 0.68rem; margin-top: 0.6rem; gap: 1rem; }
  body.editing .admintools { display: flex; }
  .admintools button {
    font: inherit; background: none; border: none; cursor: pointer;
    color: var(--dim); border-bottom: 1px solid var(--hair); padding: 0;
  }
  .admintools button:hover { color: var(--acid); border-color: var(--acid); }
  .admintools button.del:hover { color: var(--rosa); border-color: var(--rosa); }

  .addbar { display: none; max-width: 56rem; margin: 0 auto 2rem; align-items: center; gap: 1rem; flex-wrap: wrap; }
  body.editing .addbar { display: flex; }
  .addbar button {
    font-family: "Space Mono", monospace; font-size: 0.74rem;
    letter-spacing: 0.05em; text-transform: lowercase;
    background: var(--acid); color: #000;
    border: none; padding: 0.6rem 1.1rem; cursor: pointer;
    box-shadow: 4px 4px 0 var(--rosa);
  }
  .addbar button:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--rosa); }
  .addbar #flierStatus { font-size: 0.7rem; color: var(--dim); }

  /* editor dialog */
  dialog {
    border: 2px solid var(--acid);
    background: var(--bg);
    color: var(--fg);
    padding: 1.6rem;
    max-width: 26rem; width: calc(100vw - 3rem);
    font-family: "Space Mono", monospace;
    box-shadow: 8px 8px 0 var(--rosa);
  }
  dialog::backdrop { background: rgba(10,10,8,0.7); }
  dialog h3 {
    font-family: "Unbounded", sans-serif;
    font-weight: 600; text-transform: lowercase;
    font-size: 1rem; margin-bottom: 1.2rem; color: var(--acid);
  }
  dialog label {
    display: block;
    font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim);
    margin: 0.9rem 0 0.25rem;
  }
  dialog input, dialog textarea {
    width: 100%; font: inherit; font-size: 0.85rem;
    border: none; border-bottom: 1px solid var(--fg);
    background: transparent; padding: 0.25rem 0; color: var(--fg);
    color-scheme: dark;
  }
  dialog input:focus, dialog textarea:focus { outline: none; border-bottom-color: var(--acid); }
  dialog input[type="date"] { font-size: 0.8rem; }
  dialog .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  dialog .toggle { display: flex; align-items: center; gap: 0.6rem; margin-top: 1.1rem; cursor: pointer; }
  dialog .toggle input {
    appearance: none; -webkit-appearance: none;
    width: 2.1rem; height: 1.15rem; border: 1px solid var(--fg);
    border-radius: 1rem; position: relative; cursor: pointer; flex-shrink: 0;
  }
  dialog .toggle input::after {
    content: ""; position: absolute; top: 1px; left: 1px;
    width: 0.95rem; height: 0.95rem; border-radius: 50%;
    background: var(--fg); transition: transform 0.15s ease;
  }
  dialog .toggle input:checked { background: var(--acid); }
  dialog .toggle input:checked::after { transform: translateX(0.93rem); background: #000; }
  dialog .toggle span { font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
  dialog .actions { display: flex; gap: 1.5rem; margin-top: 1.6rem; align-items: center; }
  dialog .actions button { font: inherit; font-size: 0.74rem; letter-spacing: 0.05em; text-transform: lowercase; cursor: pointer; }
  dialog .actions .save { background: var(--acid); color: #000; border: none; padding: 0.6rem 1.1rem; box-shadow: 3px 3px 0 var(--rosa); }
  dialog .actions .save:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--rosa); }
  dialog .actions .cancel { background: none; border: none; color: var(--dim); padding: 0; }
  dialog .actions .cancel:hover { color: var(--fg); }
  dialog .err { font-size: 0.7rem; color: var(--rosa); margin-top: 1rem; display: none; }

  /* ---------- mobile ---------- */
  @media (max-width: 640px) {
    .day { grid-template-columns: 1fr; gap: 1rem 0; padding: 1.8rem 0; }
    .datemark { display: flex; align-items: baseline; gap: 0.7rem; line-height: 1; flex-wrap: wrap; }
    .datemark .num { font-size: 2rem; }
    .datemark .dow, .datemark .mon, .datemark .hoy { margin: 0; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .day { animation: rise 0.45s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  }
  @media (prefers-reduced-motion: reduce) {
    header .cuentas { white-space: normal; }
    header .cuentas .tira { animation: none; display: inline; padding: 0; }
    .event, .addbar button, dialog .actions .save { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>cartelera gdl ★</h1>
  <p class="sub">conciertos · eventos · foros · galerías</p><br>
  <p class="updated" id="updated"></p>
  <p class="cuentas" id="cuentas"></p>
  <p class="about">un robot lee los flyers de estas cuentas cada mañana para que
  tú no tengas que vivir en instagram.<br>
  a veces alucina — checa fecha y precio en el post antes de salir 🙏</p>
</header>

<div class="addbar">
  <button id="addBtn" type="button">+ agregar evento</button>
  <button id="flierBtn" type="button">📸 subir flier</button>
  <span id="flierStatus"></span>
  <input type="file" id="flierInput" accept="image/png,image/jpeg,image/webp" multiple hidden>
</div>

<main id="main"><div class="status">cargando…</div></main>

<footer>
  <span></span>
  <button id="editToggle" type="button">editar</button>
</footer>

<dialog id="editor">
  <h3 id="editorTitle">Evento</h3>
  <label for="f_title">título</label>
  <input id="f_title" autocomplete="off">
  <label for="f_artists">artistas (separados por coma)</label>
  <input id="f_artists" autocomplete="off">
  <label for="f_venue">lugar</label>
  <input id="f_venue" autocomplete="off">
  <div class="row">
    <div>
      <label for="f_date">fecha</label>
      <input id="f_date" type="date">
    </div>
    <div>
      <label for="f_time">hora (HH:MM)</label>
      <input id="f_time" placeholder="20:00" autocomplete="off">
    </div>
  </div>
  <label for="f_cover">cover</label>
  <input id="f_cover" placeholder="$100mxn preventa / entrada libre" autocomplete="off">
  <label for="f_url">link (post / boletos)</label>
  <input id="f_url" autocomplete="off">
  <label for="f_notes">notas</label>
  <input id="f_notes" autocomplete="off">
  <label class="toggle">
    <input type="checkbox" id="f_featured">
    <span>destacado — título resaltado</span>
  </label>
  <div class="actions">
    <button class="save" id="saveBtn" type="button">guardar</button>
    <button class="cancel" id="cancelBtn" type="button">cancelar</button>
  </div>
  <p class="err" id="editorErr"></p>
</dialog>

<script>
/* ================= config ================= */
const GH_OWNER = "scottfunk";        // <-- your GitHub username
const GH_REPO  = "eventos-gdl";      // <-- your repo name
const GH_FILE  = "events.json";
const GH_BRANCH = "main";

/* ================= state ================= */
let events = [];
let editIndex = null; // null = adding

const MESES = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO",
               "JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
const DIAS  = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
const NON_IG_SOURCES = new Set(["manual", "flier callejero"]);

/* Parse YYYY-MM-DD as LOCAL date (avoid UTC off-by-one). */
function localDate(s) {
  if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
/* 20:00 -> 8pm, 20:30 -> 8:30pm */
function fmtTime(t) {
  const m = /^(\d{1,2}):(\d{2})$/.exec(t || "");
  if (!m) return t || "";
  let h = Number(m[1]); const min = m[2];
  const ap = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return min === "00" ? `${h}${ap}` : `${h}:${min}${ap}`;
}
/* $150 -> $150mxn (leaves existing mxn and non-price text alone) */
function fmtCover(c) {
  return (c || "").replace(/\$\s?([\d,]+)(?![\d,])(?!\s*mxn)/gi, "$$$1mxn");
}
/* stable anchor id per event, e.g. "2026-07-11-applecats-en-guadalajara" */
function slugOf(ev) {
  const base = ((ev.date || "sf") + "-" + (ev.title || "evento"))
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
  return base.slice(0, 80);
}

/* ================= load ================= */
async function load() {
  loadAccounts(); // fire and forget
  try {
    const r = await fetch(GH_FILE + "?t=" + Date.now());
    if (!r.ok) throw new Error(r.status);
    events = await r.json();
  } catch (e) {
    document.getElementById("main").innerHTML =
      '<div class="status">no se pudo cargar events.json — si abriste este archivo directamente, súbelo al repo y míralo desde el sitio publicado.</div>';
    return;
  }
  render();
}

/* Header list of watched accounts, read from accounts.txt in the repo. */
async function loadAccounts() {
  try {
    const r = await fetch("accounts.txt?t=" + Date.now());
    if (!r.ok) return;
    const handles = (await r.text()).split("\n")
      .map(l => l.trim().replace(/^@/, ""))
      .filter(l => l && !l.startsWith("#"));
    if (!handles.length) return;
    // random order on every reload
    for (let i = handles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [handles[i], handles[j]] = [handles[j], handles[i]];
    }
    const strip = handles
      .map(h => `<a href="https://www.instagram.com/${esc(h)}/" target="_blank" rel="noopener">@${esc(h)}</a>`)
      .join(" ");
    document.getElementById("cuentas").innerHTML =
      `<span class="tira">${strip} ${strip}</span>`;
  } catch (e) { /* header just stays without the list */ }
}

/* ================= render ================= */
function render() {
  const main = document.getElementById("main");
  const today = todayStr();
  const editing = document.body.classList.contains("editing");

  const upcoming = events
    .map((ev, i) => ({ ...ev, _i: i }))
    .filter(ev => (!ev.needs_review || editing) && (!ev.date || ev.date >= today));

  if (!upcoming.length) {
    main.innerHTML = '<div class="status">nada en cartelera por ahora.</div>';
    return;
  }

  const dated = upcoming.filter(e => e.date).sort((a, b) => a.date.localeCompare(b.date) || (a.time||"").localeCompare(b.time||""));
  const undated = upcoming.filter(e => !e.date);

  const groups = new Map();
  for (const ev of dated) {
    if (!groups.has(ev.date)) groups.set(ev.date, []);
    groups.get(ev.date).push(ev);
  }

  let html = "";
  for (const [date, evs] of groups) {
    const d = localDate(date);
    const isToday = date === today;
    html += `<section class="day${isToday ? " today" : ""}">
      <div class="datemark">
        <span class="dow">${DIAS[d.getDay()]}</span>
        <span class="num">${d.getDate()}</span>
        <span class="mon">${MESES[d.getMonth()]}</span>
        ${isToday ? '<span class="hoy">HOY</span>' : ""}
      </div>
      <div class="events">${evs.map(renderEvent).join("")}</div>
    </section>`;
  }
  if (undated.length) {
    html += `<section class="day undated">
      <div class="datemark"><span class="sf">POR<br>CONFIRMAR</span></div>
      <div class="events">${undated.map(renderEvent).join("")}</div>
    </section>`;
  }
  main.innerHTML = html;

  main.querySelectorAll("[data-edit]").forEach(b =>
    b.addEventListener("click", () => openEditor(Number(b.dataset.edit))));
  main.querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", () => delEvent(Number(b.dataset.del))));

  const stamps = events.map(e => e.found_at).filter(Boolean).sort();
  const last = stamps.length ? new Date(stamps[stamps.length - 1]) : new Date();
  const hh = last.getHours() % 12 || 12;
  const ap = last.getHours() >= 12 ? "pm" : "am";
  const mm = String(last.getMinutes()).padStart(2, "0");
  document.getElementById("updated").textContent =
    `actualizado ${last.getDate()} ${MESES[last.getMonth()].toLowerCase()} · ${hh}:${mm}${ap} · ${upcoming.length} evento${upcoming.length === 1 ? "" : "s"}`;

  if (location.hash) {
    const target = document.getElementById(location.hash.slice(1));
    if (target) target.scrollIntoView({ block: "start" });
  }
}

function renderEvent(ev) {
  const artists = (ev.artists || []).join(", ");
  const meta = [];
  if (ev.time) meta.push(esc(fmtTime(ev.time)));
  if (ev.venue) meta.push(esc(ev.venue));
  if (ev.cover) meta.push(esc(fmtCover(ev.cover)));
  if (ev.age_restriction) meta.push(esc(ev.age_restriction));
  const showAccount = ev.account && !NON_IG_SOURCES.has(ev.account);
  const slug = slugOf(ev);
  const pageUrl = location.origin + location.pathname;
  const waText = encodeURIComponent(
    `${ev.title || artists || "Evento"} — ${ev.date || "fecha por confirmar"}` +
    (ev.venue ? ` en ${ev.venue}` : "") + `\n${pageUrl}#${slug}`
  );
  const links = [];
  if (ev.post_url) links.push(`<a href="${esc(ev.post_url)}" target="_blank" rel="noopener">ver post ↗</a>`);
  if (ev.ticket_url) links.push(`<a href="${esc(ev.ticket_url)}" target="_blank" rel="noopener">boletos ↗</a>`);
  links.push(`<a href="https://wa.me/?text=${waText}" target="_blank" rel="noopener">compartir ↗</a>`);
  return `<article class="event${ev.featured ? " featured" : ""}" id="${esc(slug)}">
    <h2><span>${esc(ev.title || artists || "(sin título)")}</span>${ev.needs_review ? '<span class="revisar">revisar</span>' : ""}</h2>
    ${artists && artists !== ev.title ? `<p class="artists">${esc(artists)}</p>` : ""}
    ${meta.length ? `<p class="meta">${meta.join('<span class="sep">·</span>')}</p>` : ""}
    ${ev.notes ? `<p class="notes">${esc(ev.notes)}</p>` : ""}
    <p class="links">${links.join('<span class="sep"> · </span>')}</p>
    ${showAccount ? `<p class="fuente"><a href="https://www.instagram.com/${esc(ev.account)}/" target="_blank" rel="noopener">@${esc(ev.account)}</a></p>` : ""}
    <div class="admintools">
      <button type="button" data-edit="${ev._i}">editar</button>
      <button type="button" class="del" data-del="${ev._i}">borrar</button>
    </div>
  </article>`;
}

/* ================= admin ================= */
function getToken(forcePrompt = false) {
  let t = localStorage.getItem("gh_token");
  if (!t || forcePrompt) {
    t = prompt("Token de GitHub (fine-grained, solo este repo, permiso Contents read/write).\nSe guarda únicamente en este navegador.");
    if (t) localStorage.setItem("gh_token", t.trim());
  }
  return t;
}

document.getElementById("editToggle").addEventListener("click", () => {
  if (!document.body.classList.contains("editing")) {
    if (!getToken()) return;
    document.body.classList.add("editing");
    document.getElementById("editToggle").textContent = "salir de edición";
  } else {
    document.body.classList.remove("editing");
    document.getElementById("editToggle").textContent = "editar";
  }
  render(); // review-flagged events show only in edit mode
});

const editor = document.getElementById("editor");
const F = id => document.getElementById(id);

document.getElementById("addBtn").addEventListener("click", () => openEditor(null));
document.getElementById("cancelBtn").addEventListener("click", () => editor.close());

/* ------- flier upload from computer ------- */
const flierInput = document.getElementById("flierInput");
const flierStatus = document.getElementById("flierStatus");
document.getElementById("flierBtn").addEventListener("click", () => flierInput.click());

flierInput.addEventListener("change", async () => {
  const files = [...flierInput.files];
  flierInput.value = "";
  if (!files.length) return;
  const token = getToken();
  if (!token) return;

  const extFor = { "image/png": "png", "image/jpeg": "jpg", "image/webp": "webp" };
  let ok = 0;
  for (const [i, file] of files.entries()) {
    flierStatus.textContent = `subiendo ${i + 1}/${files.length}…`;
    try {
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("no se pudo leer el archivo"));
        r.readAsDataURL(file);
      });
      const name = `flier-${Date.now()}-${i}.${extFor[file.type] || "jpg"}`;
      const put = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/inbox/${name}`,
        {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/vnd.github+json",
          },
          body: JSON.stringify({
            message: `flier upload: ${name}`,
            content: b64,
            branch: GH_BRANCH,
          }),
        }
      );
      if (!put.ok) throw new Error(`GitHub ${put.status}`);
      ok++;
    } catch (e) {
      flierStatus.textContent = `error con ${file.name}: ${e.message}`;
      return;
    }
  }
  flierStatus.textContent =
    `✓ ${ok} flier${ok > 1 ? "s" : ""} enviado${ok > 1 ? "s" : ""} — confirmación por Telegram en ~1 min`;
});

function openEditor(index) {
  editIndex = index;
  const ev = index === null ? {} : events[index];
  F("editorTitle").textContent = index === null ? "Agregar evento" : "Editar evento";
  F("f_title").value = ev.title || "";
  F("f_artists").value = (ev.artists || []).join(", ");
  F("f_venue").value = ev.venue || "";
  F("f_date").value = ev.date || "";
  F("f_time").value = ev.time || "";
  F("f_cover").value = ev.cover || "";
  F("f_url").value = ev.post_url || "";
  F("f_notes").value = ev.notes || "";
  F("f_featured").checked = !!ev.featured;
  F("editorErr").style.display = "none";
  editor.showModal();
}

document.getElementById("saveBtn").addEventListener("click", async () => {
  const date = F("f_date").value.trim(); // input[type=date] gives YYYY-MM-DD
  const ev = {
    ...(editIndex !== null ? events[editIndex] : { account: "manual", found_at: new Date().toISOString() }),
    title: F("f_title").value.trim() || null,
    artists: F("f_artists").value.split(",").map(s => s.trim()).filter(Boolean),
    venue: F("f_venue").value.trim() || null,
    date: date || null,
    time: F("f_time").value.trim() || null,
    cover: F("f_cover").value.trim() || null,
    post_url: F("f_url").value.trim() || null,
    notes: F("f_notes").value.trim() || null,
    featured: F("f_featured").checked,
    needs_review: false, // saving = reviewed = published
  };
  if (editIndex === null) events.push(ev);
  else events[editIndex] = ev;
  await persist();
});

async function delEvent(index) {
  const ev = events[index];
  if (!confirm(`¿Borrar "${ev.title || "(sin título)"}"?`)) return;
  events.splice(index, 1);
  await persist();
}

function showErr(msg) {
  const el = F("editorErr");
  el.textContent = msg;
  el.style.display = "block";
}

/* Write events.json back to the repo via GitHub Contents API. */
async function persist() {
  const token = getToken();
  if (!token) return;
  const api = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
  const headers = {
    "Authorization": `Bearer ${token}`,
    "Accept": "application/vnd.github+json",
  };
  try {
    // fresh sha every time (the daily Action also commits this file)
    const cur = await fetch(`${api}?ref=${GH_BRANCH}&t=${Date.now()}`, { headers, cache: "no-store" });
    if (!cur.ok) throw new Error(`GitHub ${cur.status} al leer el archivo`);
    const sha = (await cur.json()).sha;

    const body = JSON.stringify(events, null, 2);
    const put = await fetch(api, {
      method: "PUT",
      headers,
      body: JSON.stringify({
        message: "manual edit via cartelera",
        content: btoa(unescape(encodeURIComponent(body))),
        sha,
        branch: GH_BRANCH,
      }),
    });
    if (!put.ok) {
      if (put.status === 401 || put.status === 403) {
        localStorage.removeItem("gh_token");
        throw new Error("Token inválido o sin permisos — vuelve a intentar para capturarlo de nuevo.");
      }
      throw new Error(`GitHub ${put.status} al guardar`);
    }
    editor.close();
    render();
  } catch (e) {
    if (editor.open) showErr(e.message);
    else alert(e.message);
  }
}

load();
</script>
